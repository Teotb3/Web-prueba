<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Redirecting…</title>
  <link rel="canonical" href="https://teotorres.com/opinions/">
  <script>
    (function () {
      var target = window.location.protocol === 'file:' ? 'opinions/index.html' : '/opinions/';
      window.location.replace(target);
    })();
  </script>
  <meta http-equiv="refresh" content="0; url=/opinions/">
</head>
<body>
  <p>Redirecting to <a href="/opinions/">/opinions/</a></p>
</body>
</html>
